# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: svrtech
service: so-vale-reclamar-api

provider:
  name: aws
  runtime: nodejs20.x
  variablesResolutionMode: 20210326
  region: us-east-1 
  stage: ${opt:stage, 'dev'}
  environment:
    BUCKET_NAME: ${self:custom.bucketName}
    DATABASE_URL: ${env:DATABASE_URL, ssm:/sovalereclamar/prod/database-url}
  httpApi:
      cors: true
      authorizers:
        cognitoAuth:
          type: jwt
          identitySource: $request.header.Authorization
          issuerUrl: 
            Fn::Join:
              - ""
              - - "https://cognito-idp.${self:provider.region}.amazonaws.com/"
                - Ref: CognitoUserPool
          audience:
            - Ref: CognitoUserPoolClient

custom:
  bucketName: sovalereclamar-fotos-bruno-dev-${self:provider.stage}

resources:
  Resources:
    
    UploadsBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.bucketName}
        CorsConfiguration:
          CorsRules:
            - AllowedMethods: [PUT, POST, GET]
              AllowedOrigins: ['*']
              AllowedHeaders: ['*']
        # Objetos são fotos de reclamações exibidas no feed público, então
        # liberamos leitura pública via bucket policy (não via ACL). É preciso
        # desbloquear políticas públicas no Block Public Access do bucket.
        PublicAccessBlockConfiguration:
          BlockPublicAcls: true
          IgnorePublicAcls: true
          BlockPublicPolicy: false
          RestrictPublicBuckets: false

    # Concede leitura pública (apenas GetObject) dos objetos do bucket, para que
    # o mediaUrl retornado por /uploads/presigned-url possa ser exibido no app.
    UploadsBucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref UploadsBucket
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: PublicReadGetObject
              Effect: Allow
              Principal: "*"
              Action: s3:GetObject
              Resource: !Sub "${UploadsBucket.Arn}/*"

    CognitoUserPool:
      Type: AWS::Cognito::UserPool
      Properties:
        UserPoolName: SoValeReclamarUsers-${self:provider.stage}
        UsernameAttributes:
          - email
        AutoVerifiedAttributes:
          - email
        LambdaConfig:
          PostConfirmation: !GetAtt PostConfirmationLambdaFunction.Arn
        Policies:
          PasswordPolicy:
            MinimumLength: 8
            RequireLowercase: true
            RequireNumbers: true
            RequireSymbols: false
            RequireUppercase: false

    # Permite que o Cognito invoque a Lambda de PostConfirmation.
    PostConfirmationInvokePermission:
      Type: AWS::Lambda::Permission
      Properties:
        Action: lambda:InvokeFunction
        FunctionName: !GetAtt PostConfirmationLambdaFunction.Arn
        Principal: cognito-idp.amazonaws.com
        SourceArn: !GetAtt CognitoUserPool.Arn

    CognitoUserPoolClient:
      Type: AWS::Cognito::UserPoolClient
      Properties:
        ClientName: SoValeReclamarIonicApp
        UserPoolId: !Ref CognitoUserPool
        ExplicitAuthFlows:
          - ALLOW_USER_SRP_AUTH
          - ALLOW_USER_PASSWORD_AUTH
          - ALLOW_REFRESH_TOKEN_AUTH
        GenerateSecret: false
        
functions:
  createComplaint:
    handler: src/functions/complaints/create.handler
    events:
      - httpApi:
          path: /complaints
          method: POST
          authorizer:
            name: cognitoAuth
  
  searchEntities:
    handler: src/functions/entities/search.handler
    events:
      - httpApi:
          path: /entities/search
          method: GET

  createEntity:
    handler: src/functions/entities/create.handler
    events:
      - httpApi:
          path: /entities
          method: POST
          authorizer:
            name: cognitoAuth

  listComplaints:
    handler: src/functions/complaints/list.handler
    events:
      - httpApi:
          path: /entities/{id}/complaints
          method: GET

  corroborateComplaint:
    handler: src/functions/engagement/corroborate.handler
    events:
      - httpApi:
          path: /complaints/{id}/corroborate
          method: POST
          authorizer:
            name: cognitoAuth

  generateUploadUrl:
    handler: src/functions/uploads/generate-url.handler
    events:
      - httpApi:
          path: /uploads/presigned-url
          method: POST
          authorizer:
            name: cognitoAuth
  getFeed:
    handler: src/functions/feed/list.handler
    events:
      - httpApi:
          path: /feed
          method: GET

  # Invocada pelo Cognito (PostConfirmation) — sem evento HTTP.
  # A ligação com o User Pool é feita via LambdaConfig no recurso CognitoUserPool.
  postConfirmation:
    handler: src/functions/auth/post-confirmation.handler